aid: ios
name: iOS
description: >-
  iOS is Apple's mobile operating system and the developer platform behind iPhone
  apps. While the bulk of the iOS SDK is delivered as Swift / Objective-C client
  frameworks (UIKit, SwiftUI, MapKit, HealthKit, HomeKit, SiriKit, StoreKit,
  AppIntents, PassKit, WidgetKit, ActivityKit), Apple also exposes a substantial
  set of server-side HTTPS APIs that iOS developers, publishers, and back-end
  systems consume directly. This repository indexes that server-side surface —
  App Store Connect API, App Store Server API, App Store Server Notifications,
  Apple Push Notification service (APNs), DeviceCheck / App Attest, Sign in with
  Apple, Apple Music API, the Wallet / PassKit Web Service contract, and related
  developer infrastructure — and points to the matching OpenAPI artifacts where
  Apple publishes them.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - iOS
  - Apple
  - Mobile
  - App Store
  - Push Notifications
  - In-App Purchases
  - Subscriptions
  - Authentication
  - Wallet
  - Developer Platform

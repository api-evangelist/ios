capability: ios.apns
description: >-
  Shared Naftiko capability for the Apple Push Notification service (APNs).
  APNs is an HTTP/2 + JSON delivery surface — a provider establishes a long-
  lived HTTP/2 connection to api.push.apple.com (production) or
  api.sandbox.push.apple.com (sandbox) and POSTs notifications to
  /3/device/{deviceToken}. Authentication is either a JWT (ES256) provider
  token or a per-app TLS client certificate.
provider: apple
service: apns
baseURL: https://api.push.apple.com
sandboxURL: https://api.sandbox.push.apple.com
auth:
  type: jwt-or-mtls
  jwt:
    algorithm: ES256
    issuer: developer-team-id
    audience: apns
  mtls:
    description: Per-app APNs TLS client certificate issued via developer.apple.com.
operations:
  - id: send-notification
    method: POST
    path: /3/device/{deviceToken}
    summary: Send a Notification to a Device.
    tags: [Push Notifications]
    headers:
      - name: apns-topic
        description: The app's bundle ID (or bundle ID + push type suffix).
      - name: apns-push-type
        description: alert, background, voip, complication, fileprovider, mdm, location, liveactivity, pushtotalk.
      - name: apns-priority
        description: 10 (immediate) or 5 (power-considerate); 1 for low-power background.
      - name: apns-expiration
        description: UNIX epoch seconds for notification expiry; 0 = drop if undeliverable.
      - name: apns-collapse-id
        description: Coalesce multiple notifications under a single identifier.
      - name: apns-id
        description: A UUID identifying the notification; echoed back in the response.

capability: ios.app-store-server
description: >-
  Shared Naftiko capability surface for the App Store Server API — the
  server-to-server REST endpoints iOS publishers use to look up transaction
  history, query subscription status, request a test notification, and issue
  refunds. Production and sandbox base URLs differ; payloads and responses are
  JWS-signed.
provider: apple
service: app-store-server-api
baseURL: https://api.storekit.itunes.apple.com
sandboxURL: https://api.storekit-sandbox.itunes.apple.com
auth:
  type: jwt
  algorithm: ES256
  issuer: appstoreconnect-team-id
  audience: appstoreconnect-v1
operations:
  - id: get-transaction-history
    method: GET
    path: /inApps/v2/history/{transactionId}
    summary: Get a Customer's In-App Purchase Transaction History.
    tags: [Transactions, Receipts]
  - id: get-transaction-info
    method: GET
    path: /inApps/v1/transactions/{transactionId}
    summary: Get a Specific Transaction by ID.
    tags: [Transactions]
  - id: get-all-subscription-statuses
    method: GET
    path: /inApps/v1/subscriptions/{transactionId}
    summary: Get All Subscription Statuses for a Customer.
    tags: [Subscriptions, Status]
  - id: send-consumption-information
    method: PUT
    path: /inApps/v1/transactions/consumption/{originalTransactionId}
    summary: Send Consumption Information for a Refund Request.
    tags: [Refunds, Consumption]
  - id: look-up-order
    method: GET
    path: /inApps/v1/lookup/{orderId}
    summary: Look Up Order ID Transactions.
    tags: [Orders]
  - id: get-refund-history
    method: GET
    path: /inApps/v2/refund/lookup/{transactionId}
    summary: Get Refund History for a Transaction.
    tags: [Refunds]
  - id: request-test-notification
    method: POST
    path: /inApps/v1/notifications/test
    summary: Request a Test App Store Server Notification.
    tags: [Notifications, Testing]
  - id: get-test-notification-status
    method: GET
    path: /inApps/v1/notifications/test/{testNotificationToken}
    summary: Get Test Notification Status.
    tags: [Notifications, Testing]
  - id: get-notification-history
    method: POST
    path: /inApps/v1/notifications/history
    summary: Get App Store Server Notification History.
    tags: [Notifications, Audit]
  - id: extend-subscription-renewal-date
    method: PUT
    path: /inApps/v1/subscriptions/extend/{originalTransactionId}
    summary: Extend a Subscriber's Renewal Date.
    tags: [Subscriptions, Retention]

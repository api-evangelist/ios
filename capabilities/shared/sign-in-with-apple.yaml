capability: ios.sign-in-with-apple
description: >-
  Shared Naftiko capability for Sign in with Apple — Apple's OpenID Connect-
  flavored identity provider. The REST surface lives at appleid.apple.com and
  is used by iOS apps (and web apps) to exchange authorization codes for ID
  tokens, refresh tokens, and to revoke them. JWKS keys are exposed at
  /auth/keys for ID-token validation.
provider: apple
service: sign-in-with-apple
baseURL: https://appleid.apple.com
auth:
  type: client-secret-jwt
  algorithm: ES256
  notes: >-
    The client_secret is a JWT signed with the team's Sign in with Apple key,
    valid for up to six months, used to authenticate to /auth/token and
    /auth/revoke.
operations:
  - id: get-jwks
    method: GET
    path: /auth/keys
    summary: Get Sign in with Apple Public Keys (JWKS).
    tags: [Authentication, Keys]
  - id: exchange-authorization-code
    method: POST
    path: /auth/token
    summary: Exchange an Authorization Code or Refresh Token for an ID Token.
    tags: [Authentication, Tokens]
  - id: revoke-token
    method: POST
    path: /auth/revoke
    summary: Revoke a Refresh or Access Token.
    tags: [Authentication, Tokens]

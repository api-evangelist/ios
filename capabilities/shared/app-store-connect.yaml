capability: ios.app-store-connect
description: >-
  Shared Naftiko capability surface for the App Store Connect API — the
  operations an iOS publisher most often automates via REST: managing apps and
  metadata, builds and TestFlight, in-app purchases and subscriptions, pricing
  and availability, and the analytics / sales / financial / power-and-
  performance reporting stack.
provider: apple
service: app-store-connect-api
baseURL: https://api.appstoreconnect.apple.com
auth:
  type: jwt
  algorithm: ES256
  issuer: appstoreconnect-team-id
  audience: appstoreconnect-v1
operations:
  - id: list-apps
    method: GET
    path: /v1/apps
    summary: List Apps in the team's App Store Connect account.
    tags: [Apps, App Store Connect]
  - id: get-app
    method: GET
    path: /v1/apps/{id}
    summary: Get an App by its Apple ID.
    tags: [Apps, App Store Connect]
  - id: list-builds
    method: GET
    path: /v1/builds
    summary: List Builds across the team's apps.
    tags: [Builds, TestFlight]
  - id: list-beta-groups
    method: GET
    path: /v1/betaGroups
    summary: List TestFlight Beta Groups.
    tags: [TestFlight, Beta Groups]
  - id: list-beta-testers
    method: GET
    path: /v1/betaTesters
    summary: List TestFlight Beta Testers.
    tags: [TestFlight, Beta Testers]
  - id: list-app-store-versions
    method: GET
    path: /v1/appStoreVersions
    summary: List App Store Versions across apps.
    tags: [App Store, Versions]
  - id: list-in-app-purchases
    method: GET
    path: /v1/inAppPurchases
    summary: List In-App Purchases.
    tags: [In-App Purchases]
  - id: list-subscriptions
    method: GET
    path: /v1/subscriptions
    summary: List Auto-Renewable Subscriptions.
    tags: [Subscriptions]
  - id: request-analytics-report
    method: POST
    path: /v1/analyticsReportRequests
    summary: Request an Analytics Report run.
    tags: [Reporting, Analytics]
  - id: list-sales-and-trends-reports
    method: GET
    path: /v1/salesReports
    summary: Download Sales and Trends Reports.
    tags: [Reporting, Sales]
  - id: list-finance-reports
    method: GET
    path: /v1/financeReports
    summary: Download Financial Reports.
    tags: [Reporting, Finance]
  - id: list-customer-reviews
    method: GET
    path: /v1/customerReviews
    summary: List Customer Reviews across apps.
    tags: [Reviews, App Store]
  - id: respond-to-customer-review
    method: POST
    path: /v1/customerReviewResponses
    summary: Respond to a Customer Review.
    tags: [Reviews, App Store]
  - id: list-bundle-ids
    method: GET
    path: /v1/bundleIds
    summary: List Bundle IDs in the team's provisioning portal.
    tags: [Provisioning]
  - id: list-profiles
    method: GET
    path: /v1/profiles
    summary: List Provisioning Profiles.
    tags: [Provisioning]
  - id: list-ci-products
    method: GET
    path: /v1/ciProducts
    summary: List Xcode Cloud CI Products.
    tags: [Xcode Cloud]
  - id: start-ci-build-run
    method: POST
    path: /v1/ciBuildRuns
    summary: Start a new Xcode Cloud Build Run.
    tags: [Xcode Cloud]

name: iOS / Apple Developer Plans and Pricing
specification: API Commons Plans 0.1
url: https://raw.githubusercontent.com/api-evangelist/ios/main/plans/ios-plans-pricing.yml
description: >-
  Apple does not price the App Store Connect API, App Store Server API, APNs,
  DeviceCheck, Sign in with Apple, or the Apple Music API by call volume. API
  access is gated by membership in one of Apple's developer programs. Below is
  the plan structure as documented on developer.apple.com/programs/whats-included.
modified: '2026-05-22'

plans:
  - id: free-account
    name: Apple ID Developer Account
    price:
      amount: 0
      currency: USD
      period: annual
    audience: Individuals exploring Apple platforms
    apis_included:
      - On-device testing on personal devices
    apis_excluded:
      - App Store Connect API
      - App Store Server API
      - App Distribution
      - TestFlight
    notes: >-
      Anyone with an Apple ID can sign in to developer.apple.com and download
      Xcode and SDKs, but cannot distribute apps or use App Store Connect APIs.

  - id: apple-developer-program
    name: Apple Developer Program
    price:
      amount: 99
      currency: USD
      period: annual
      reference_quote: "99 USD per membership year"
    audience: Individual developers, organizations, and small teams
    apis_included:
      - App Store Connect API
      - App Store Server API
      - App Store Server Notifications V2
      - Apple Push Notification service (APNs)
      - DeviceCheck and App Attest
      - Sign in with Apple
      - Apple Music API (with separate Apple Music partner agreement)
      - Wallet / PassKit
      - TestFlight (up to 100 internal + 10,000 external testers)
    included_capacity:
      - resource: Xcode Cloud
        included: 25 compute hours per month
      - resource: CloudKit storage
        included: 1 PB free
      - resource: WeatherKit
        included: 500,000 API calls per month
    notes: >-
      Required for App Store distribution and for using all server-side iOS
      APIs documented in this repo.

  - id: apple-developer-enterprise-program
    name: Apple Developer Enterprise Program
    price:
      amount: 299
      currency: USD
      period: annual
    audience: Organizations distributing proprietary, internal-only iOS apps to employees
    apis_included:
      - Internal distribution signing
      - APNs for internal-only apps
    notes: >-
      Does not allow App Store distribution. Separate enrollment from the
      standard Apple Developer Program.

  - id: app-store-small-business-program
    name: App Store Small Business Program
    price:
      amount: 0
      currency: USD
      period: annual
      note: Reduced App Store commission, not an additional fee
    audience: App Store sellers earning under USD 1 million in proceeds in a calendar year
    commission_rate:
      standard: '30%'
      reduced: '15%'
    notes: >-
      Reduces Apple's App Store commission on paid apps and IAP from 30% to 15%
      for qualifying small businesses. Distinct from the Apple Developer Program
      membership fee.

  - id: app-store-commission
    name: App Store Commission
    description: >-
      Per-transaction revenue share Apple collects on App Store sales and in-app
      purchases routed through StoreKit.
    tiers:
      - tier: Standard
        rate: '30%'
        applies_to: First-year subscriptions, one-time purchases, most apps
      - tier: After 1 year of paid subscription
        rate: '15%'
        applies_to: Auto-renewing subscriptions after 12 paid months
      - tier: Small Business Program
        rate: '15%'
        applies_to: Members of the App Store Small Business Program
      - tier: Reader / Media app exceptions
        rate: 'variable'
        applies_to: News and entertainment subscriptions per Apple's published rules
